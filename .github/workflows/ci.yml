name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

# Allow the Pages deploy job to publish, and serialise deploys.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  spec:
    name: PASM model validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
      - name: Validate the PASM model
        run: uv run pasm validate

  rust:
    name: Format, lint, and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Bevy system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev libudev-dev libwayland-dev libxkbcommon-dev
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: Validate authored content
        run: cargo run -p aeon_tools -- validate-content
      - name: Acceptance replay verification
        run: cargo run -p aeon_tools -- accept

  wasm:
    name: Build the web client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: Swatinem/rust-cache@v2
      - name: Add the wasm target
        run: rustup target add wasm32-unknown-unknown
      - name: Install trunk
        # Built from source rather than a third-party action, so the
        # wasm job carries no Node-runtime dependency of its own; the
        # rust-cache above keeps the compiled binary between runs.
        run: cargo install --locked trunk
      - name: Build the release web bundle
        working-directory: crates/aeon_client
        # The site is served from a repository subpath on GitHub Pages, so
        # the asset URLs must be prefixed with the repository name.
        run: trunk build --release --public-url /last-aeon/
      - name: Upload the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: crates/aeon_client/dist

  deploy:
    name: Deploy to GitHub Pages
    # Only publish the playable build from the default branch.
    if: github.ref == 'refs/heads/main'
    needs: [spec, rust, wasm]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
