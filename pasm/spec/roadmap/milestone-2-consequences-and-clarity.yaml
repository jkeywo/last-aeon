# Post-MVP implementation plan — Milestone 2
#
# This milestone deliberately deepens the existing Ashkarr Succession MVP. It
# adds no provinces, factions, bodies, or second scenario: its value comes from
# letting existing politics, travel, jobs, economy, and warfare affect one
# another more visibly and more often.

entities:
  - system: milestone-2-implementation-plan
    core:
      status: accepted
      confidence: confirmed
      title: "Milestone 2: Consequences and Clarity"
      summary: >-
        A post-MVP vertical-slice programme that makes the existing local-system
        campaign more reactive, legible, and strategically consequential. It
        introduces contextual events, provincial order, explicit political
        obligations, intent-driven AI, informative job forecasts, and map and
        campaign-information improvements without expanding the authored map
        scope, organisation roster, or campaign count.
      references:
        - mvp-vision
        - full-game-vision
        - deterministic-campaign-simulation
        - headless-authoritative-simulation
        - milestone-2-contextual-event-system
        - provincial-order-system
        - political-obligation-ledger
        - intent-driven-organisation-agency
        - job-forecast-and-explanation-ui
        - strategic-map-intelligence-modes

  - milestone: m2-forecast-and-information-foundation
    core:
      status: accepted
      confidence: confirmed
      title: "M2.1: Forecast and Information Foundation"
      summary: >-
        Expose the simulation's existing job calculations before commitment and
        make ongoing campaign changes navigable. Job starts show cost, duration,
        order delay, governing skill, effective difficulty, exact current result
        odds, result effects, and risk consequences. The log becomes filterable
        and links entries to their subject.
      references:
        - job-forecast-and-explanation-ui
        - notable-result-message-log
        - context-sensitive-job-ui
        - skill-shifted-result-weights
        - physical-presence-and-order-delay
      goals:
        - A player can compare every eligible leader and see the exact result distribution that would apply if that leader started the selected job now.
        - Every displayed chance, resource cost, delay, and risk has hover help that names its inputs and distinguishes a known effect from a conditional outcome.
        - A military job separates the job-roll forecast from the conditional operational contest rather than claiming a false single probability.
        - Forecast values are derived by shared simulation code and test-locked against eventual resolution weights.
    implementation:
      paths:
        - crates/aeon_sim/src/forecast.rs
        - crates/aeon_sim/src/jobs.rs
        - crates/aeon_client/src/forecast_view.rs
        - crates/aeon_client/src/jobs_ui.rs
        - crates/aeon_client/src/ui/actions.rs
      tests:
        - crates/aeon_sim/tests/jobs.rs
      status: declared

    evidence:
      - kind: test
        reference: crates/aeon_sim/tests/jobs.rs
        summary: Over fifteen hundred seeded runs the outcomes of a job land within tolerance of the odds its forecast quoted, alongside exact assertions on permille apportionment, skill shifting, tail floors, costs, order delay, risks, and blocked reasons.
      - kind: manual-review
        reference: crates/aeon_sim/src/forecast.rs
        summary: Outcome weighting, duration and risk chances live in one module that both the forecast and job resolution call, so the quoted figures cannot drift from the ones used to resolve; verified in the browser, where a forecast quoting W 50 and I 10 deducted exactly that on starting.
  - milestone: m2-provincial-order-and-map-intelligence
    core:
      status: accepted
      confidence: confirmed
      title: "M2.2: Provincial Order and Map Intelligence"
      summary: >-
        Give every province a persistent, inspectable order state that connects
        rule, economy, presence, and warfare. Present the resulting pressures
        through new strategic map modes and a situation strip that identifies
        holdings requiring attention.
      references:
        - provincial-order-system
        - strategic-map-intelligence-modes
        - wealth
        - physical-presence-and-order-delay
        - military-operation-system
      goals:
        - Siege, raid, blockade, shortages, and neglect reduce order; successful administration, security, supply, and legitimate presence can restore it.
        - Order has clear bounded economic, military, and event-frequency consequences, all captured in snapshots and deterministic replays.
        - Holder and Great House modes remain available; Order, Wealth, Military, Player Relations, and Claim Pressure modes have legends, hover summaries, and colour-safe non-colour cues.
        - The situation strip identifies active threats such as critically low order, hostile operations, and expiring obligations and navigates to the relevant subject.
    implementation:
      paths:
        - crates/aeon_sim/src/order.rs
        - crates/aeon_sim/src/economy.rs
        - crates/aeon_sim/src/warfare.rs
        - crates/aeon_sim/src/snapshot.rs
        - crates/aeon_client/src/map_modes.rs
        - crates/aeon_client/src/view.rs
        - crates/aeon_client/src/ui/inspector.rs
      tests:
        - crates/aeon_sim/tests/order.rs
        - crates/aeon_sim/tests/logistics.rs
        - crates/aeon_sim/tests/warfare.rs
      status: declared

    evidence:
      - kind: test
        reference: crates/aeon_sim/tests/order.rs
        summary: Order is neutral at its starting value, damage persists unless the holder attends to the province, siege and blockade erode it, a province left in unrest revolts and stops paying its former ruler, unrest answered in time never becomes a revolt, and the whole system round-trips through a snapshot.
      - kind: manual-review
        reference: crates/aeon_client/src/map_modes.rs
        summary: Verified in the browser across Holder, Great House, Order and Wealth modes; each carries a legend, a hover explanation, and its value printed on every province so the map never has to be read by colour alone.
  - milestone: m2-contextual-events-and-obligations
    core:
      status: accepted
      confidence: confirmed
      title: "M2.3: Contextual Events and Political Obligations"
      summary: >-
        Introduce a deterministic, data-authored event runtime and a small
        explicit ledger of political favours, promises, and grievances. Events
        arise from travel, job progress, provincial pressure, and political
        relationships; their choices create consequences that the rest of the
        simulation can see and act upon.
      references:
        - milestone-2-contextual-event-system
        - political-obligation-ledger
        - job-result-event-system
        - validated-declarative-game-data
        - character-opinion-model
      goals:
        - Event eligibility, priority, cooldown, selection, choices, effects, and history are data-authored, validated, deterministic, and snapshot-safe.
        - The initial reusable event deck contains travel, job-complication, provincial-pressure, and political-obligation events, but adds no new map entities or scenario organisations.
        - A choice may create, fulfil, break, or expire a specific favour, promise, or grievance; its visible political effect is not represented only as an opaque opinion modifier.
        - The player can inspect an obligation's parties, origin, expiry or fulfilment condition, and relevant gameplay consequences.
    implementation:
      paths:
        - crates/aeon_sim/src/events.rs
        - crates/aeon_sim/src/obligations.rs
        - crates/aeon_data/src/model.rs
        - crates/aeon_data/src/effect.rs
        - crates/aeon_data/src/host
        - crates/aeon_sim/src/snapshot.rs
        - assets/content/core/events.rhai
        - assets/content/scenario/ashkarr-succession.rhai
      tests:
        - crates/aeon_sim/tests/events.rs
        - crates/aeon_data/tests/loading.rs
      status: declared

    evidence:
      - kind: test
        reference: crates/aeon_sim/tests/events.rs
        summary: Events fire only where their declarative conditions hold, respect per-subject cooldowns, record the answer given to a weighty choice, and replay identically through a snapshot; authored obligations seed at the start, expire on their day, stay on the record once settled, and move independently of opinion.
      - kind: manual-review
        reference: assets/content/scenario/ashkarr-succession.rhai
        summary: The scenario opens with nine standing obligations among the existing houses; verified in the browser, where House Veyrin's inspector lists a favour from Harrow, a favour owed to Calder and a grievance from Pell, each with its origin, expiry and weight.
  - milestone: m2-reactive-agency-and-acceptance
    core:
      status: accepted
      confidence: confirmed
      title: "M2.4: Reactive Agency and Milestone Acceptance"
      summary: >-
        Make autonomous houses respond to current pressures through scored,
        inspectable priorities, then prove the whole enhanced campaign remains
        deterministic on native and web targets.
      references:
        - intent-driven-organisation-agency
        - organisation-agency-model
        - m2-contextual-events-and-obligations
        - deterministic-seed-and-command-replay
        - mvp-acceptance-and-release
      goals:
        - AI job selection scores a small deterministic shortlist for tangible pressures—threatened or disordered holdings, political weakness, obligations, resource recovery, and viable claims—while retaining the shared job pipeline.
        - The player can inspect why a significant AI action occurred through its log/event history, without exposing hidden random rolls as false certainty.
        - A seeded multi-year Ashkarr playthrough containing events, obligation changes, order changes, and AI responses replays from a mid-campaign snapshot to the identical final state hash.
        - Content validation, headless tests, native build, and web build remain CI gates for the milestone.
    implementation:
      paths:
        - crates/aeon_sim/src/agency.rs
        - crates/aeon_sim/src/jobs.rs
        - crates/aeon_data/src/model.rs
        - crates/aeon_tools/src/main.rs
        - crates/aeon_sim/tests/acceptance.rs
      tests:
        - crates/aeon_sim/tests/events.rs
        - crates/aeon_sim/tests/acceptance.rs
      status: declared

    evidence:
      - kind: test
        reference: crates/aeon_sim/tests/acceptance.rs
        summary: A multi-year playthrough on the real scenario with a holding knocked out of order, snapshotted mid-flight while events, obligations and order are live, replays the identical continuation to the same state hash, and asserts that events fired, obligations stood, order moved and an autonomous house acted on a pressure.
      - kind: test
        reference: crates/aeon_sim/tests/events.rs
        summary: Houses score the pressures they are actually under, notice a favour they could call in, and record in the log why they acted, while the pressure-to-job mapping stays authored on the job rather than named in the engine.