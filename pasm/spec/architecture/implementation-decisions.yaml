  - decision: define-army-content-type
    core:
      status: accepted
      confidence: confirmed
      title: Starting Armies Are Authored Content
      summary: >-
        A define_army content type declares an army present at campaign
        start with an owner, a general (validated to be a member of the
        owner), a province, manpower, and supplies. These spawn in
        content-key order alongside authored ships when the campaign
