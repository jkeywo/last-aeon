# Implementation decisions taken while building the MVP.
#
# These record concrete technical choices the roadmap milestones left open.
# Each decision names the accepted vision/architecture entities it serves so
# traceability from code back to intent stays navigable.

entities:
  - decision: rust-workspace-crate-layout
    core:
      status: accepted
      confidence: confirmed
      title: Five-Crate Cargo Workspace
      summary: >-
        The implementation is a Cargo workspace of five crates. aeon_core
        holds engine-agnostic foundations (stable IDs, deterministic RNG,
        calendar, fixed-point arithmetic, state hashing) with no Bevy
        dependency. aeon_data owns the Rhai host, content definitions, and
        content validation. aeon_sim is the headless authoritative Bevy ECS
        simulation. aeon_client is the native/web presentation binary.
        aeon_tools is the developer CLI used by CI for content validation,
        headless runs, and replay verification.
      rationale:
        - Separating engine-agnostic foundations from the ECS simulation keeps determinism testable without an engine and reusable from the tools CLI.
        - A dedicated client crate enforces the headless-authoritative boundary at the crate graph level; presentation cannot reach into simulation internals that are not exported.
      references:
        - last-aeons-simulation-runtime
        - headless-simulation-host
        - headless-authoritative-simulation
        - scripted-command-boundary

  - decision: dependency-baseline-bevy-and-rhai
    core:
      status: accepted
      confidence: confirmed
      title: "Dependency Baseline: Bevy 0.19, bevy_egui 0.41, Rhai 1.25, Rust 1.95"
      summary: >-
        The workspace pins Rust 1.95.0 via rust-toolchain.toml (with the
        wasm32-unknown-unknown target) and builds on Bevy 0.19 with default
        features disabled for the simulation, bevy_egui 0.41 for 2D panels,
        and Rhai 1.25 with the sync feature for authored content.
      rationale:
        - Pinning the toolchain and versions keeps native, web, and CI builds identical, which the deterministic replay guarantee depends on.
        - Disabling Bevy default features in the simulation crate prevents renderer, audio, and windowing concerns from leaking into authoritative code.
      references:
        - last-aeons-simulation-runtime
        - rhai-game-scripting
        - shared-native-and-web-delivery

  - decision: hand-rolled-deterministic-rng
    core:
      status: accepted
      confidence: confirmed
      title: Hand-Rolled Deterministic RNG Streams
      summary: >-
        aeon_core implements its own xoshiro256** generator seeded via
        splitmix64, instead of depending on external RNG crates. Named
        streams are derived from the campaign seed plus a purpose label plus
        the acting entity's stable ID, and golden-value tests lock the
        streams' outputs permanently.
      rationale:
        - External RNG crates may change algorithms or stream behaviour across versions, which would silently break replay of recorded campaigns.
        - Purpose-plus-entity stream derivation means unrelated systems cannot perturb each other's random sequences when systems are added or reordered.
      references:
        - deterministic-seed-and-command-replay
        - deterministic-campaign-simulation

  - decision: integer-arithmetic-for-authoritative-outcomes
    core:
      status: accepted
      confidence: confirmed
      title: Authoritative Outcomes Use Integer Arithmetic
      summary: >-
        All authoritative simulation quantities (resources, progress, opinion
        values, chances) are integers or i64 fixed-point milli-units.
        Floating point appears only in presentation-side code such as camera
        movement and rendering.
      rationale:
        - Integer arithmetic is bit-identical across native and WebAssembly builds, removing the main platform-divergence risk to deterministic replay.
        - Milli-unit fixed point gives authored content fractional rates without exposing gameplay to float rounding drift.
      references:
        - deterministic-campaign-simulation
        - shared-native-and-web-delivery

  - decision: stable-id-ordered-iteration
    core:
      status: accepted
      confidence: confirmed
      title: Simulation Iterates in Stable-ID Order
      summary: >-
        Wherever iteration order can influence an authoritative outcome, the
        simulation iterates collections ordered by stable game ID (BTreeMap
        or sorted vectors), never in hash-map or ECS query order.
      rationale:
        - Hash iteration order varies across platforms and runs, which would break replay even with identical inputs.
        - ECS query order is an engine implementation detail and must not become gameplay-significant, matching the rule that ECS handles are not durable identity.
      references:
        - deterministic-campaign-simulation
        - stable-ids-separate-from-ecs-handles

  - decision: ron-snapshots-and-jsonl-command-log
    core:
      status: accepted
      confidence: confirmed
      title: RON Snapshots and JSON-Lines Command Log
      summary: >-
        Campaign snapshots are RON documents with an explicit format version
        field, written from a dedicated serializable model rather than raw
        ECS state. The player-command log is an append-only JSON-Lines file,
        one command per line with its tick and sequence number. Replay
        verification recomputes a canonical SHA-256 state hash and compares
        it against the hash recorded in the snapshot.
      rationale:
        - Human-readable formats keep authored-scenario debugging and save-file diagnosis cheap during MVP development, and the version field gives migration a hook.
        - Line-per-command appends are crash-tolerant and trivially replayable in order.
      references:
        - versioned-snapshots-plus-command-log
        - campaign-persistence
        - deterministic-seed-and-command-replay

  - decision: campaign-calendar-twelve-thirty-day-months
    core:
      status: accepted
      confidence: confirmed
      title: Campaign Calendar Uses Twelve Thirty-Day Months
      summary: >-
        The campaign calendar is a 360-day year of twelve 30-day months,
        stored as a day count from the campaign epoch. Daily ticks resolve
        events and travel; month and year boundaries trigger the slower
        strategic pulses. The setting canon prescribes no civil calendar, so
        this is an invented convention.
      rationale:
        - Equal-length months make monthly economic and political pulses uniform, which keeps fixed-point rate arithmetic exact.
        - A plain day count serialises compactly and avoids leap-rule complexity that adds nothing to play.
      references:
        - campaign-time-model
        - pauseable-realtime-campaign

  - decision: egui-for-information-panels
    core:
      status: accepted
      confidence: confirmed
      title: 2D Information Panels Use bevy_egui
      summary: >-
        The 2D information panels (provinces, characters, jobs, ships,
        armies, titles, logs) are built with bevy_egui rather than Bevy UI.
        The 3D map views remain native Bevy rendering.
      rationale:
        - The MVP's panels are dense, data-first, and change shape every milestone; immediate-mode UI keeps that iteration cheap.
        - bevy_egui works identically on native and WebAssembly targets.
      references:
        - mvp-3d-world-and-system-with-2d-details
        - strategic-3d-map-presentation

  - decision: github-actions-ci-and-pages-delivery
    core:
      status: accepted
      confidence: confirmed
      title: GitHub Actions CI and GitHub Pages Web Delivery
      summary: >-
        CI runs on GitHub Actions for every push and pull request. It
        validates the PASM model with the pasm CLI, checks Rust formatting,
        lints with clippy at deny-warnings, runs the workspace test suite,
        and checks the client compiles for wasm32-unknown-unknown. Content
        validation joins CI with the M2 content pipeline, and the published
        playable web build deploys to GitHub Pages from main once the client
        renders (M3 onward). Work is committed and pushed per milestone.
      rationale:
        - The repository already lives on GitHub, so Actions plus Pages is the lowest-friction way to satisfy CI validation and published web delivery.
        - Validating the PASM model in CI keeps the authored architecture model and the implementation from drifting apart unnoticed.
      references:
        - scripted-content-with-ci-validation
        - shared-native-and-web-delivery
        - mvp-acceptance-and-release

  - decision: mvp-programmer-art-visual-bar
    core:
      status: accepted
      confidence: confirmed
      title: MVP Visual Bar Is Clean Programmer Art
      summary: >-
        The MVP presents flat-shaded stylised 3D bodies, solid
        political-colour province regions, and clear selection and hover
        feedback, with no textures or art asset pipeline. Composed and
        readable, not debug output; polish beyond that waits for post-MVP.
      rationale:
        - The MVP exists to prove the political simulation, so presentation effort goes to readability of political state rather than surface fidelity.
      references:
        - strategic-3d-map-presentation
        - mvp-3d-world-and-system-with-2d-details

  - decision: invented-canon-scenario-content
    core:
      status: accepted
      confidence: confirmed
      title: Scenario Content Is Freshly Invented Canon
      summary: >-
        The hand-authored scenario invents its own houses, characters,
        places, and province names, written to fit the setting's tone.
        Entities the plan explicitly names from existing canon — the
        Sanctora Imperim, the Golden Tsar, Consuls — keep their canonical
        identities. All naming lives in authored content files so a later
        renaming pass is data-only.
      rationale:
        - Existing canon does not cover a 41-province local system, and inventing coherent local canon reads better than systematic placeholders.
      references:
        - mvp-hand-authored-scenario
        - sanctora-imperim

  - decision: content-ids-are-kebab-case-strings
    core:
      status: accepted
      confidence: confirmed
      title: Authored Content IDs Are Kebab-Case Strings
      summary: >-
        Authored content refers to definitions and scenario entities by
        lowercase kebab-case string IDs, matching PASM entity ID style. At
        load these are interned to compact numeric handles; the intern table
        is part of the campaign snapshot so saves and command logs remain
        stable across content edits that do not delete IDs.
      rationale:
        - String IDs keep authored files greppable and reviewable, while interning keeps hot simulation paths cheap.
        - Persisting the intern table decouples save compatibility from content-file ordering.
      references:
        - stable-game-identity
        - validated-declarative-game-data

  - decision: rhai-sandbox-allow-list
    core:
      status: accepted
      confidence: confirmed
      title: Rhai Sandbox Is an Allow-List
      summary: >-
        Content engines start from a raw Rhai engine and register only
        deterministic language packages; wall-clock, file access, imports,
        and eval are absent rather than disabled. Rhai is built with
        no_float so authored arithmetic is integer-only, matching the
        authoritative-arithmetic decision. Hard operation, recursion, and
        size limits bound runaway scripts, and print output is captured
        into the loading report. The loading engine exposes define_*
        builder functions; the runtime engine does not, and never re-runs
        file top levels.
      rationale:
        - Deny-by-default means new Rhai features cannot silently widen the sandbox; anything scripts can do was explicitly granted.
        - Determinism restrictions enforced by the engine cannot be forgotten by individual call sites.
      references:
        - rhai-game-scripting
        - scripts-emit-validated-effects-only
        - integer-arithmetic-for-authoritative-outcomes

  - decision: content-defined-by-builder-calls
    core:
      status: accepted
      confidence: confirmed
      title: Content Files Declare Data and Provide File-Local Functions
      summary: >-
        Authored files declare definitions by calling define_job,
        define_body, define_province, and define_scenario with plain maps,
        which Rust converts and validates immediately. Dynamic behaviour is
        written as named functions in the same file; definitions may only
        reference functions defined in their own file. Loading collects all
        findings across all files rather than stopping at the first error.
      rationale:
        - Declaration-by-call keeps authored files ordinary scripts (the flexibility the vision asks for) while producing a fully validated data model.
        - File-local function references make every content file self-contained and reviewable in isolation.
      references:
        - validated-declarative-game-data
        - scripted-content-with-ci-validation
        - content-ids-are-kebab-case-strings

  - decision: effects-returned-not-emitted
    core:
      status: accepted
      confidence: confirmed
      title: Script Functions Return Effects
      summary: >-
        Authored functions receive a read-only context map and return an
        array of effect maps, which Rust parses into typed effects,
        validates, and applies. There are no emitter functions and no
        shared collector state; a script invocation is a pure call.
      rationale:
        - Pure calls cannot leak state between invocations, which keeps script execution replay-deterministic by construction.
        - Typed parsing at the boundary means malformed authored effects fail loudly at a single point with good errors.
      references:
        - scripted-command-boundary
        - scripts-emit-validated-effects-only

  - decision: content-hash-binds-saves-to-content
    core:
      status: accepted
      confidence: confirmed
      title: Snapshots Record and Require Their Content Hash
      summary: >-
        A campaign snapshot records the hash of the authored content it ran
        on, and restoring requires content with the identical hash.
        Content-free snapshots refuse attached content and vice versa.
      rationale:
        - Replaying a command log against different content silently produces a different campaign; hash binding turns that into an explicit error.
      references:
        - campaign-persistence
        - deterministic-seed-and-command-replay
        - versioned-snapshots-plus-command-log

  - decision: client-embeds-content-at-build-time
    core:
      status: accepted
      confidence: confirmed
      title: The Client Embeds Authored Content at Build Time
      summary: >-
        aeon_client's build script walks assets/content and embeds every
        authored file into the binary; native and web clients always run
        exactly the content their build was validated against. The tools
        CLI and tests read content from disk instead.
      rationale:
        - A shipped build that cannot drift from its validated content removes a whole class of content-mismatch failures, and gives the web build its content without a fetch-and-cache layer.
        - Embedding pairs naturally with content-hash save binding; a build's saves are self-consistent by construction.
      references:
        - content-hash-binds-saves-to-content
        - shared-native-and-web-delivery
        - scripted-content-with-ci-validation

  - decision: temporary-system-layout-ashkarr
    core:
      status: accepted
      confidence: confirmed
      title: "Temporary System Layout: Ashkarr, Vesk, and the Aurelian Spire"
      summary: >-
        The map milestone authors the local system as the planet Ashkarr
        (32 provinces), its moon Vesk (8 provinces), and the starbase The
        Aurelian Spire (1 province), with invented canon-consistent
        province names and Fibonacci-sphere-spread coordinates. The
        authored-scenario milestone layers houses, holders, and politics
        onto this same geography; all naming is data-only and renameable.
      rationale:
        - Establishing real geography early lets the map, selection, and inspection pipeline run against final-shaped data rather than throwaway placeholders.
      references:
        - mvp-provincial-composition
        - mvp-starbase-province
        - invented-canon-scenario-content

  - decision: gender-blind-primogeniture
    core:
      status: accepted
      confidence: confirmed
      title: MVP Succession Is Gender-Blind Primogeniture
      summary: >-
        Dynastic succession passes to the eldest living child of the dead
        head, then the eldest sibling, then the eldest living house member.
        Biological sex is recorded for lineage modelling but succession law
        ignores it. A house with no living members is defunct; if it is the
        player house, the campaign ends.
      rationale:
        - A single clear legal order keeps succession dramatic but legible, and underage or unpopular heirs create the constrained situations the vision wants.
        - Gender-blind law fits a far-future setting and halves the rule surface without weakening play.
      references:
        - mvp-dynastic-succession
        - succession-framework
        - mvp-has-no-victory-condition

  - decision: titles-hold-by-org-offices-by-character
    core:
      status: accepted
      confidence: confirmed
      title: Territorial Titles Are Held by Organisations, Personal Titles and Offices by Characters
      summary: >-
        Province and paramount titles are held by organisations and
        exercised through their current head, so succession moves whole
        holdings without retitling. The Consul title and all offices are
        held personally by characters and never inherited. Province titles
        are implicit - the simulation creates one per province - while
        paramountcies and Imperial titles are authored.
      rationale:
        - Organisation-held territory matches the vision's model of houses persisting across leaders.
        - Implicit province titles avoid forty-one lines of authored boilerplate that carry no information.
      references:
        - legal-holdings-and-obligations
        - titles-and-offices-are-separate
        - consul-and-starbase-command-hierarchy

  - decision: consul-contest-scoring
    core:
      status: accepted
      confidence: confirmed
      title: Consular Contests Score Diplomacy, Stewardship, and Sanctora Opinion
      summary: >-
        A Consular vacancy opens a 120-day contest. Living adult
        organisation heads and adult Sanctora members stand as candidates.
        The Tsar's appointment goes to the highest score of twice diplomacy
        plus stewardship plus the summed opinions of living Sanctora
        members toward the candidate, plus a small derived-stream jitter;
        ties resolve to the lower stable ID. Because opinion terms feed the
        score, political jobs that shift Sanctora opinion manipulate the
        appointment - the jobs milestone plugs directly into this.
      rationale:
        - Scoring through opinion makes the contest a genuine political arena rather than a dice roll, exactly as the vision's appointment-contest component demands.
      references:
        - imperial-appointment-contest
        - consul-vacancy-is-a-contested-appointment
        - character-opinion-model

  - decision: background-life-simulation
    core:
      status: accepted
      confidence: confirmed
      title: Yearly Life-Cycle Pulses Keep the Character Pool Alive
      summary: >-
        Yearly pulses resolve age-based mortality, opinion-driven marriage
        matching among adult house members, and births to married couples,
        all through derived random streams keyed by character and year.
        Children join the head parent's house, take names from authored
        name pools with the house surname, and get stable IDs from the
        campaign allocator.
      rationale:
        - Succession, ambition, and dynastic play need a population that replenishes itself over decades without authored intervention.
        - Per-character-per-year derived streams keep every life event replay-stable regardless of system ordering.
      references:
        - mvp-selective-character-simulation
        - character-simulation-scope
        - hand-rolled-deterministic-rng

  - decision: skill-shifted-result-weights
    core:
      status: accepted
      confidence: confirmed
      title: Result Weights Shift with Skill Against Difficulty
      summary: >-
        A job outcome is drawn from its authored result weights after
        shifting them by the leader's governing skill minus the job's
        difficulty: positive outcomes scale up with effectiveness and
        negative outcomes scale down, each floored at a fifth of the
        authored weight, using integer arithmetic and a per-job derived
        random stream.
      rationale:
        - Authored weights keep outcome shape in content hands while assignment quality visibly matters, exactly as the vision's assignment-quality decision demands.
        - Flooring keeps every authored outcome possible, so competence reduces but never removes uncertainty.
      references:
        - assignment-quality-and-presence-matter
        - duty-officer-inspired-job-catalogue
        - integer-arithmetic-for-authoritative-outcomes

  - decision: job-effect-roles
    core:
      status: accepted
      confidence: confirmed
      title: Script Effects Address Job Roles, Not IDs
      summary: >-
        Authored effect functions address characters through stable role
        names - leader, target, target-head, owner-head, liege-head,
        consul, sanctora - which the simulation resolves from the job's
        context at resolution time. Scripts never see or emit stable IDs.
      rationale:
        - Role addressing keeps authored content portable across scenarios and makes the effect boundary impossible to aim at arbitrary simulation state.
      references:
        - effects-returned-not-emitted
        - scripts-emit-validated-effects-only

  - decision: risk-consequence-catalogue
    core:
      status: accepted
      confidence: confirmed
      title: Fixed Consequences per Personal-Risk Tag
      summary: >-
        Each declared risk tag has one engine-defined consequence rolled on
        failure (doubled on disaster): injury lays the leader up for 90
        days, capture holds them 360, incapacity stops them 180, scandal
        costs 15 opinion with every organisation head for two years, and
        death flows into the succession machinery. Indisposed characters
        cannot take new jobs.
      rationale:
        - Uniform engine-owned consequences make authored risk declarations honest and comparable across the whole catalogue.
      references:
        - explicit-personal-risk-tags
        - consequential-job-failure-and-disaster
        - gender-blind-primogeniture

  - decision: ai-agency-through-the-job-catalogue
    core:
      status: accepted
      confidence: confirmed
      title: AI Organisations Act Through the Same Job Catalogue
      summary: >-
        Each month, an idle AI organisation head has an even chance of
        starting an ai_available job, chosen and targeted through derived
        random streams. AI jobs resolve through exactly the player's
        pipeline, so their flagged results reach the shared notable-result
        log; popups are player-only.
      rationale:
        - One action pipeline for player and AI keeps the world honest - whatever the player can do to the world, the world does back.
      references:
        - organisation-agency-model
        - character-led-jobs-are-primary-actions
        - notable-results-are-logged

  - decision: abstract-liner-travel-tracked-military-ships
    core:
      status: accepted
      confidence: confirmed
      title: Personal Travel Is Abstract; Tracked Ships Are Strategic Assets
      summary: >-
        Characters travel between provinces on abstract scheduled liners
        (three days locally, four plus an orbital-distance term across
        bodies); individually tracked ships are the strategic assets that
        move a third faster, carry military weight, and give capital
        captains their simulated role. This keeps the presence and delay
        model complete without coupling every journey to fleet management.
      rationale:
        - The vision requires presence and delay to bite and ships to be individual assets; it does not require personal journeys to consume fleet logistics, which would punish delegation.
      references:
        - physical-presence-and-order-delay
        - individually-tracked-ships
        - tracked-starships

  - decision: order-delay-formula
    core:
      status: accepted
      confidence: confirmed
      title: Order Delay from Head Transit and Body Separation
      summary: >-
        Player commands execute after one day plus delays computed at
        submission and recorded in the command envelope: a head in space
        delays every order until the day after arrival, and orders to a
        character on another body add half the liner travel time between
        the bodies. Recording the delay in the envelope keeps replay
        byte-identical.
      rationale:
        - Computing delay at submission makes the cost of distance visible when the order is given, which is what makes location a strategic commitment.
      references:
        - presence-constrained-command
        - physical-presence-and-order-delay
        - deterministic-seed-and-command-replay

  - decision: army-formation-through-job-effects
    core:
      status: accepted
      confidence: confirmed
      title: Armies Form Through Job Effects, Drawing Pools at Muster
      summary: >-
        Army-formation jobs pay their wealth and influence costs at start;
        the form-army script effect then draws manpower and supplies from
        the owner's pools at resolution, clamped to what exists, and
        musters the army where its general stands. Armies eat from their
        own trains monthly and waste away when the train is dry;
        disbanding returns soldiers to the pool.
      rationale:
        - Drawing troops at muster rather than commitment means a failed muster costs money and standing but not the levy itself, which reads as the fiction intends.
      references:
        - persistent-armies
        - effects-returned-not-emitted
        - legitimacy-caps-and-regenerates-influence

  - decision: engine-owned-military-operations
    core:
      status: accepted
      confidence: confirmed
      title: Military Operations Are Engine-Owned, Declared by Content
      summary: >-
        Jobs may declare a military operation - move, resupply, patrol,
        besiege, raid, blockade - whose operational semantics (marching
        with road-time minimums, garrison engagements, title-transferring
        conquest, loot, blockades halving wealth output) are simulation
        code. Content declares pacing, costs, risks, and flavour; army
        operations are always led by the army's general, and defeat in
        the field overrides the job's rolled result to failure.
      rationale:
        - Engagements and conquest touch titles, forces, and resources at once; putting them behind the script-effect boundary would either widen it unsafely or duplicate the simulation in content.
      references:
        - job-based-operational-warfare
        - military-operation-system
        - scripts-emit-validated-effects-only

  - decision: strategic-engagement-formula
    core:
      status: accepted
      confidence: confirmed
      title: Engagements Resolve from Strength, Command, Supply, and Walls
      summary: >-
        A field engagement compares army strengths - manpower scaled five
        percent per point of the general's command, sixty percent when the
        supply train is dry, and a twenty percent bonus for defending home
        ground - each with a bounded fifteen-percent swing from a derived
        stream. Winners lose five to fifteen percent of their men, losers
        twenty to thirty-five; losers retreat to their nearest holding or
        disband.
      rationale:
        - The formula makes preparation, supply, leadership, and position decide battles, which is exactly what job-based operational warfare promises instead of tactical play.
      references:
        - job-based-operational-warfare
        - assignment-quality-and-presence-matter
        - hand-rolled-deterministic-rng

  - decision: standing-orders-fire-for-idle-armies
    core:
      status: accepted
      confidence: confirmed
      title: Standing Orders Start Reactive Jobs Only for Idle Armies
      summary: >-
        An army set to defend holdings reacts to hostile besiege or raid
        operations against its owner's provinces on its body by starting a
        real, visible answer-the-alarm job. Standing orders only fire for
        armies with no active job, so a bespoke player job automatically
        takes precedence, and autonomous organisations rely on standing
        orders rather than initiating military operations through random
        agency.
      rationale:
        - Reactive automation as ordinary jobs keeps every military action inside one pipeline, cancellable and inspectable like anything else.
      references:
        - military-standing-orders
        - ai-agency-through-the-job-catalogue

  - decision: province-count-paramountcy-claim
    core:
      status: accepted
      confidence: confirmed
      title: The Paramountcy Is Claimed by Planetary Province Dominance
      summary: >-
        The vacant planetary paramountcy can be claimed through a job whose
        effect succeeds only if the claimant holds strictly more of the
        planet's provinces than any rival. The three great houses open tied
        at five planetary provinces apiece, so the title stays contested
        until play shifts the balance through conquest or seizure. Consular
        endorsement is a separate opinion-bearing job that helps a house's
        standing without gating the claim.
      rationale:
        - A hard, legible dominance test makes the succession crisis a concrete territorial problem rather than an opaque score, and the opening tie makes it genuinely contested exactly as the crisis premise requires.
        - Keeping endorsement soft honours the decision that Consular endorsement is helpful, not required.
      references:
        - planetary-paramount-title-is-contested
        - planetary-succession-crisis-origin
        - consul-endorsement-is-helpful-not-required
        - great-houses-contest-the-planet

  - decision: imperial-tithes-as-a-sanctora-lever
    core:
      status: accepted
      confidence: confirmed
      title: Imperial Tithes Are a Sanctora-Only Wealth Lever
      summary: >-
        A Consular job levies a twentieth of every house's wealth to the
        Sanctora Imperim. The effect self-validates that its owner is the
        Sanctora, so only the Consul's institution can wield it, giving the
        Sanctora an economic hold over the whole planetary field.
      rationale:
        - Tithe collection realises the Consul's entitlement to exercise Imperial authority through special jobs, and makes the Sanctora a live economic actor rather than a scenic power.
      references:
        - consul-title
        - consul-and-starbase-command-hierarchy
        - imperial-appointment-contest

  - decision: full-scenario-cast-and-allocation
    core:
      status: accepted
      confidence: confirmed
      title: "Authored Cast: Fourteen Organisations, Thirty-Eight Characters, Full Allocation"
      summary: >-
        The scenario authors three great houses, eight vassal houses (the
        player's House Harrow among them, bound to Veyrin), two independent
        houses, and the Sanctora Imperim, with every one of the 41
        provinces allocated to a holder and per-province economic output.
        Thirty-eight named characters carry the political web, and six
        ships (three capital, with captains) seed local-space play. Every
        vassal names one great-house liege; some vassals and one
        independent are lunar.
      rationale:
        - A fully allocated, densely populated field makes the opening political web immediate and legible, satisfying the hand-authored-scenario and organisation-landscape decisions in one authored content set.
      references:
        - mvp-hand-authored-scenario
        - mvp-three-overhouses-and-eight-vassals
        - mvp-vassal-allegiance-and-independents
        - great-houses-contest-the-planet
        - invented-canon-scenario-content

  - decision: cli-acceptance-round-trip
    core:
      status: accepted
      confidence: confirmed
      title: Acceptance Is a CLI Round-Trip Verified in CI
      summary: >-
        The aeon tools CLI gains a scenario-aware run/replay/hash surface
        (a --content flag loads the authored scenario) and an 'accept'
        command that runs the scenario to the end, snapshots it mid-run,
        restores that snapshot, replays the remaining days, and confirms
        the replayed final state hash equals the original. CI runs 'aeon
        accept' on every push, so a determinism regression fails the build.
      rationale:
        - A single end-to-end command run in CI turns the deterministic-replay guarantee into a continuously enforced gate rather than a claim.
      references:
        - deterministic-seed-and-command-replay
        - versioned-snapshots-plus-command-log
        - mvp-acceptance-and-release

  - decision: github-pages-subpath-delivery
    core:
      status: accepted
      confidence: confirmed
      title: The Playable Web Build Deploys to GitHub Pages
      summary: >-
        CI builds the release WebAssembly client with trunk, prefixing
        asset URLs with the repository subpath (--public-url /last-aeon/),
        uploads it as a Pages artifact, and deploys it to GitHub Pages from
        main after the spec, test, and wasm jobs pass. The same authored
        content is embedded at build time, so the published build cannot
        drift from what CI validated. Enabling Pages with the GitHub
        Actions source is a one-time repository setting.
      rationale:
        - Bevy's shared native and web delivery makes the web build a near-free additional target, and Pages is the lowest-friction host for it.
      references:
        - shared-native-and-web-delivery
        - client-embeds-content-at-build-time
        - github-actions-ci-and-pages-delivery

  - decision: define-army-content-type
    core:
      status: accepted
      confidence: confirmed
      title: Starting Armies Are Authored Content
      summary: >-
        A define_army content type declares an army present at campaign
        start with an owner, a general (validated to be a member of the
        owner), a province, manpower, and supplies. These spawn in
        content-key order alongside authored ships when the campaign
        begins, then live as ordinary runtime armies (snapshots already
        round-trip army state, so no snapshot-format change is needed).
      rationale:
        - Authoring starting armies as content, rather than seeding them in code, keeps the whole opening military situation in the same validated, greppable place as the rest of the scenario.
      references:
        - persistent-armies
        - mvp-hand-authored-scenario
        - army-formation-through-job-effects

  - decision: starting-armies-per-faction
    core:
      status: accepted
      confidence: confirmed
      title: Every Faction Fields a Standing Army at Start
      summary: >-
        The scenario opens with seventeen standing armies: two for each
        great house, one for each vassal and independent house, and a
        Sanctora garrison on the Aurelian Spire, each led by an assigned
        general. Starting armies are pre-fielded forces separate from an
        organisation's recruitable manpower pool.
      rationale:
        - A populated military map from turn one makes presence, standing orders, and the province-level force picture legible immediately, which the marker-only map did not convey.
      references:
        - define-army-content-type
        - full-scenario-cast-and-allocation
        - military-standing-orders

  - decision: political-globe-region-texture
    core:
      status: accepted
      confidence: confirmed
      title: The Globe Is a Baked Political Region Map
      summary: >-
        Each body's globe is a custom UV sphere whose equirectangular UVs
        match, texel-for-texel, a texture baked from the simulation's
        holdings: every texel takes the colour of its nearest province
        centre (great-circle nearest), black where it borders a different
        province, neutral where unheld. Two map modes colour by the direct
        holder or by the great house at the top of the holder's liege
        chain. The texture rebakes only when the focused body, the map
        mode, or a holding changes, tracked by a holdings fingerprint.
        Picking raycasts the globe and selects the nearest province to the
        hit point, marked by a pin; an egui overlay projects province names
        and army/ship badges, culling the far hemisphere.
      rationale:
        - Painting provinces as bordered regions coloured by their holder reads as a real political map, which marker dots never did, while baking on change keeps the per-frame cost at zero.
      references:
        - mvp-3d-world-and-system-with-2d-details
        - egui-for-information-panels
        - starting-armies-per-faction

  - decision: context-sensitive-job-ui
    core:
      status: accepted
      confidence: confirmed
      title: Jobs Start from Context Buttons on the Selection
      summary: >-
        The player starts a job from action buttons on the inspected
        entity rather than a separate form. A member of the player's house
        lists the jobs they can lead (target-less jobs on one click, others
        via an inline picker and Confirm); an outside character offers the
        schemes that target them plus Petition the Consul when they hold
        that title; a province offers the military jobs with an inline army
        or ship picker and itself pre-filled. Ineligible leaders are
        filtered and rejections surface inline. Every action still issues
        the same PlayerCommand::StartJob through the authoritative pipeline.
      rationale:
        - Anchoring the available jobs to what the player is looking at makes the action set legible and surfaces otherwise-buried jobs such as recruiting an army, without changing the authoritative command path.
      references:
        - character-led-jobs-are-primary-actions
        - headless-authoritative-simulation
        - egui-for-information-panels

  - decision: forecasts-derive-from-shared-resolution-code
    core:
      status: accepted
      confidence: confirmed
      title: Forecasts and Resolution Share One Calculation
      summary: >-
        Outcome weighting, job duration, and personal-risk chances live in
        a single simulation-owned module that both the forecast and the
        resolution call. Job resolution rolls against exactly the table the
        forecast reports, and a march is quoted by the function that sets
        its duration. Odds are apportioned to permille by largest
        remainder so they sum exactly, and a conditional military contest
        is reported separately rather than folded into the roll.
      rationale:
        - A forecast is strategic information only if it cannot drift from the simulation that later fulfils it; sharing the code makes drift impossible rather than merely unlikely.
        - Separating the operational contest avoids promising a precision the model does not possess at order time.
      references:
        - job-forecasts-share-authoritative-calculations
        - job-forecast-and-explanation-ui
        - skill-shifted-result-weights

  - decision: order-is-neutral-at-its-starting-value
    core:
      status: accepted
      confidence: confirmed
      title: Provincial Order Is Balanced Around Its Starting Value
      summary: >-
        Both consequences of order — what a province yields and how
        reliably it is defended — are exactly neutral at the settled
        starting value, so introducing the system rebalanced nothing. A
        quiet province holds its ground indefinitely; active harm always
        pushes order down; damage is repaired only where the holder
        attends to the province with troops or in person, and only back to
        settled. Order beyond that is earned by deliberate administrative
        work through authored effects.
      rationale:
        - Anchoring the modifiers at the starting value means order can be added to a balanced campaign without silently re-tuning its economy or its battles.
        - Making passive attention repair rather than improve keeps presence from becoming a free bonus for merely existing somewhere, and gives administrative jobs a purpose.
      references:
        - provincial-order-system
        - provincial-order-connects-existing-systems
        - wealth

  - decision: revolt-vacates-rather-than-transfers
    core:
      status: accepted
      confidence: confirmed
      title: A Revolt Vacates a Province Rather Than Gifting It
      summary: >-
        A province left in open unrest past its telegraphed clock throws
        off its ruler and its title falls vacant, rather than passing to a
        rival. It stops paying its former holder, counts toward nobody's
        claim, and can be taken by whoever can hold it. The warning is
        given the day the clock starts and the remaining days stay visible
        while it runs.
      rationale:
        - Losing ground to your own misrule is a real stake, but handing it to a rival would make neglect a gift rather than a failure.
        - A vacant title is recoverable through the existing siege rules, which keeps the state bounded and free of irreversible collapse.
      references:
        - provincial-order-system
        - military-operation-system
        - planetary-paramount-title-is-contested

  - decision: weighty-events-interrupt-minor-events-inform
    core:
      status: accepted
      confidence: confirmed
      title: Only Weighty Events Interrupt
      summary: >-
        Events are drawn by two independent daily gates. A weighty event
        raises a choice popup and pauses the campaign, and is rare enough
        to be worth the interruption; a minor event applies its effect and
        writes to the filterable log without stopping play. Eligibility is
        declarative data rather than script, evaluated over subjects in
        stable ID order, and every firing and answer is recorded.
      rationale:
        - The client pauses on every popup, so event volume is really a question of how often play is interrupted; splitting the deck keeps interruption proportionate to consequence.
        - Declarative eligibility can be validated at load and replays identically, which scripted predicates would not guarantee.
      references:
        - milestone-2-contextual-event-system
        - milestone-2-event-scope-is-systemic-not-map-expansion
        - notable-result-message-log

  - decision: obligations-seeded-in-the-opening-scenario
    core:
      status: accepted
      confidence: confirmed
      title: The Succession Opens With a Political Past
      summary: >-
        The Ashkarr scenario begins with nine authored obligations among
        the existing houses — favours owed, promises with deadlines, and
        grievances of long standing. The ledger is therefore live from the
        first day and already shapes what autonomous houses do, rather
        than being an empty system that only fills through play.
      rationale:
        - A succession crisis without prior debts and grudges has no political history for the crisis to be about.
        - Seeded entries exercise the ledger, its events, and intent-driven agency from turn one without adding any new map entities or houses.
      references:
        - political-obligation-ledger
        - obligations-are-specific-political-facts
        - mvp-hand-authored-scenario

  - decision: agency-intents-are-authored-on-jobs
    core:
      status: accepted
      confidence: confirmed
      title: Which Job Answers Which Pressure Is Authored Content
      summary: >-
        Autonomous houses score concrete pressures, then choose among jobs
        whose authored ai_intent declares that they answer that pressure.
        The simulation never names a piece of content, so a new job joins
        the AI's repertoire by declaring an intent. A house explains in the
        log why it acted on a pressure, while routine upkeep speaks through
        its results.
      rationale:
        - Hardcoding job keys in the engine would couple the simulation to a particular content set and break every fixture that authors its own jobs.
        - Explaining pressure-driven actions makes autonomous behaviour legible without exposing the roll that broke a tie as though it were certainty.
      references:
        - intent-driven-organisation-agency
        - ai-agency-through-the-job-catalogue
        - job-system

  - decision: egui-with-owned-design-tokens
    core:
      status: accepted
      confidence: confirmed
      title: egui Plus an Owned Design-Token Layer, Not an HTML Interface
      summary: >-
        The interface stays on egui, and its whole appearance moves into a
        serde token file the client embeds at build time. A designed token
        set replaces the authored one wholesale without touching rendering
        code. The alternative of defining the interface in HTML was
        investigated and rejected: wry is a native webview binding and
        cannot compile to wasm32, which is the target the game is actually
        played on; bevy_wry has been unmaintained since 2024 and
        bevy_webview_wry is pinned to an older Bevy. bevy_hui does support
        the current Bevy but ships no widgets at all, against an open engine
        limitation preventing a child node escaping its parent's clipping —
        which is exactly what tooltips and dropdowns need, and this
        interface is made of pervasive hover explanations, pickers, scroll
        areas and modal windows.
      rationale:
        - The web build is the primary playable surface, so an approach that cannot compile to wasm32 could never serve it whatever its merits natively.
        - Owning roughly 250 lines of token struct carries no migration risk and no dependency that can go stale, where the published egui theme crates are either abandoned or unverified against the egui version in use.
        - Tokens translate mechanically into egui's state-keyed style, so design work can be requested as a token file plus static mockups rather than as shipping code.
      references:
        - job-forecast-and-explanation-ui
        - context-sensitive-job-ui

  - decision: single-source-leader-availability
    core:
      status: accepted
      confidence: confirmed
      title: Exactly One Function Answers Whether a Character May Lead
      summary: >-
        leader_availability in the simulation is the only answer to whether
        a character can lead a job, and it returns the specific cause rather
        than a boolean. Being assigned a standing command is not a blocker
        in itself — a general may still lead a diplomatic job — so whether a
        commitment bars a particular job is asked per target. The client
        renders the returned cause and never re-derives eligibility.
      rationale:
        - Three partial implementations had drifted apart, which is what made busy characters appear selectable and then silently no-op on click.
        - A cause rather than a boolean is what lets the interface say why someone is unavailable and when they will be free, instead of omitting them and leaving the player to wonder where their household went.
      references:
        - context-sensitive-job-ui
        - job-system

  - decision: ship-captains-are-assigned-and-consequential
    core:
      status: accepted
      confidence: confirmed
      title: Ships Are Commanded by Assigned Captains
      summary: >-
        A ship's captain is assigned by player command, persists like an
        army's general, is required before the ship can be ordered, and
        scales what the ship achieves. Content validation checks that a
        captain belongs to the ship's owner. On a captain's death the post
        falls vacant and says so.
      rationale:
        - The field existed but was inert, so the interface papered over a missing captain by falling back to the house head, which meant ordering a ship nobody was commanding.
        - Giving the post mechanical weight makes assigning it a decision rather than a formality, and matches how armies already work.
      references:
        - job-system
        - job-based-operational-warfare

  - decision: hop-distance-answers-realm-questions
    core:
      status: accepted
      confidence: confirmed
      title: Realm Questions Are Answered by Hop Distance, Not Top of Chain
      summary: >-
        Whether a province answers to a house is asked as a hop count
        through the liege chain, in the simulation rather than the client.
        Walking to the top of the chain answers a different question and is
        wrong for any house that is itself a vassal.
      rationale:
        - The player's own house is a vassal, so a top-of-chain walk attributed its holdings to its liege and showed the player none of their own realm.
        - Living in the simulation makes it testable against the real scenario rather than only against whatever the client happens to render.
      references:
        - strategic-map-intelligence-modes
        - title-based-territorial-politics

  - decision: painter-drawn-ui-icons
    core:
      status: accepted
      confidence: confirmed
      title: Interface Icons Are Drawn From Primitives
      summary: >-
        Icons are drawn as painter shapes inside a unit square, scaled to
        whatever rect they are given. The client ships no image assets and
        the egui integration requires textures to be registered before use,
        so an icon set made of files would add a loading path, a
        registration step and a wasm packaging concern. Font glyphs were
        rejected because coverage varies by platform and a missing glyph is
        a silent box rather than a build error.
      rationale:
        - Primitive shapes are resolution-independent, tinted by the theme like every other element, and identical on both targets.
        - Shapes are chosen to differ in silhouette rather than in detail, because at toolbar size the outline is what is actually read.
      references:
        - strategic-map-intelligence-modes
        - egui-with-owned-design-tokens

  - decision: world-read-access-module
    core:
      status: accepted
      confidence: confirmed
      title: One Module Answers World-Read Questions
      summary: >-
        The simulation crate has a single access module that answers
        "give me this entity's record": records and entities by stable
        ID, display names, the Consul and the Sanctora, stable-ID-ordered
        ID collections, message-log date stamping, and campaign-seed
        stream derivation. Systems no longer open-code the index-entity-
        component walk, private display-name resolvers, or their own
        seed fetching.
      rationale:
        - Every open-coded copy of these walks was a place the stable-ID-iteration and derived-stream rules could be silently broken; concentrating them makes the determinism discipline reviewable in one file.
        - The migration was verified behaviour-identical by bit-equal acceptance hashes before and after, so the refactor carries no replay risk.
      references:
        - stable-id-ordered-iteration
        - hand-rolled-deterministic-rng
        - deterministic-campaign-simulation

  - decision: restore-mirrors-capture
    core:
      status: accepted
      confidence: confirmed
      title: A Full Restore Reads at One Seam, Mirroring Capture
      summary: >-
        capture_state has always listed every persisted section in one
        place; restore now does too. restore_state installs the
        content-free half (identity, clock, allocator, command pipeline,
        obligations, events) and restore_content_state respawns the
        content-bound half (map, politics, forces, jobs, script runtime,
        content database) in the same order start_campaign_with_content
        creates it. The host composes the pair instead of finishing the
        restore itself with knowledge the snapshot module did not state.
      rationale:
        - Which sections restore where used to be split across two files and asymmetric with capture; a new persisted section could be captured but silently never restored, caught only by the acceptance replay.
        - Naming the two halves makes the content-free/content-bound boundary — which already governed obligations and events — an explicit rule rather than an accident of where code accumulated.
      references:
        - versioned-snapshots-plus-command-log
        - content-hash-binds-saves-to-content
        - campaign-persistence

  - decision: decisions-are-pure-application-is-separate
    core:
      status: accepted
      confidence: confirmed
      title: Random Decisions Are Pure Functions; Application Is Separate
      summary: >-
        Wherever a derived stream settles an outcome, the decision is a
        pure function of explicit inputs and the stream, separate from the
        world mutation that applies it. Job outcomes are drawn by
        forecast::resolve_outcome — the same module that reports the odds,
        so the roll obeys the forecast by construction rather than by two
        hand-written samplers agreeing. Field engagements are decided by
        decide_engagement over gathered EngagementInputs, and autonomous
        houses pick from their shortlist through pick_intent. Each
        consumes a fixed number of rolls, and each is unit-tested —
        including a statistical test that the sampler's empirical
        frequencies match result_odds.
      rationale:
        - The forecast promised the roll would use exactly the table shown to the player, but the sampler was a second hand-rolled implementation buried in a &mut World monolith with no test able to hold the two together.
        - A decision that is pure in its inputs and stream can be tested across thousands of seeds without running campaign ticks, which is where formula bugs actually get caught.
      references:
        - forecasts-derive-from-shared-resolution-code
        - job-forecasts-share-authoritative-calculations
        - strategic-engagement-formula
        - agency-intents-are-authored-on-jobs

  - decision: boundary-vocabularies-parsed-once
    core:
      status: accepted
      confidence: confirmed
      title: Script Boundary Vocabularies Are Typed, and Parsed Exactly Once
      summary: >-
        The vocabularies authored content shares with the simulation — the
        seven effect roles (leader, target, target-head, owner-head,
        liege-head, consul, sanctora) and the obligation kinds (favour,
        promise, grievance) — are enums in the content crate, parsed once
        where the content enters (define_* conversion and effect parsing)
        and typed everywhere after. A mistyped role or kind is a loud
        parse error, never a silent no-op or a defensive fallback. One
        resolver (JobRoles::resolve) answers who stands behind each role
        for jobs, popup choices, and events alike, and every effect
        function receives one documented context schema (source, result,
        leader, target) regardless of what invoked it.
      rationale:
        - The role vocabulary had one producer, three consumers, and no type; events had already drifted to filling only half the roles, and a typo'd role addressed nobody without a word of complaint.
        - Parsing at the boundary is the only place the whole vocabulary is visible at once, which is what makes the error message able to spell out every valid spelling.
      references:
        - effects-returned-not-emitted
        - scripts-emit-validated-effects-only
        - job-effect-roles

  - decision: non-modal-character-picker
    core:
      status: accepted
      confidence: confirmed
      title: The Character Picker Is a Workspace, Not a Modal
      summary: >-
        Choosing who leads an action happens in one non-modal window that
        stays open when a candidate is selected. Candidates carry their
        whole forecast rather than a summary of it, so the breakdown shown
        while comparing is the object that will resolve the job. Those who
        cannot take the job on are listed below a divider with the
        simulation's own account of where they are; when nobody is free the
        empty state names the soonest date one comes free.
      rationale:
        - Choosing a leader is comparison work, and a window that closes on selection forces the comparison to be restarted for every candidate considered.
        - Carrying the forecast rather than a summary means the figure compared on cannot drift from the figure committed to, which is the same guarantee the forecast system already makes for the expanded action.
        - An empty list that explains itself and names a date turns waiting into a decision rather than a guess.
      references:
        - forecasts-derive-from-shared-resolution-code
        - single-source-leader-availability
        - context-sensitive-job-ui
