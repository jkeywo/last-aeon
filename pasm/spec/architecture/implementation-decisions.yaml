        - army-formation-through-job-effects

  - decision: starting-armies-per-faction
    core:
      status: accepted
      confidence: confirmed
      title: Every Faction Fields a Standing Army at Start
      summary: >-
        The scenario opens with seventeen standing armies: two for each
        great house, one for each vassal and independent house, and a
        Sanctora garrison on the Aurelian Spire, each led by an assigned
        general. Starting armies are pre-fielded forces separate from an
        organisation's recruitable manpower pool.
      rationale:
        - A populated military map from turn one makes presence, standing orders, and the province-level force picture legible immediately, which the marker-only map did not convey.
      references:
        - define-army-content-type
        - full-scenario-cast-and-allocation
        - military-standing-orders

  - decision: political-globe-region-texture
    core:
      status: accepted
      confidence: confirmed
      title: The Globe Is a Baked Political Region Map
      summary: >-
        Each body's globe is a custom UV sphere whose equirectangular UVs
        match, texel-for-texel, a texture baked from the simulation's
        holdings: every texel takes the colour of its nearest province
        centre (great-circle nearest), black where it borders a different
        province, neutral where unheld. Two map modes colour by the direct
        holder or by the great house at the top of the holder's liege
        chain. The texture rebakes only when the focused body, the map
        mode, or a holding changes, tracked by a holdings fingerprint.
        Picking raycasts the globe and selects the nearest province to the
        hit point, marked by a pin; an egui overlay projects province names
        and army/ship badges, culling the far hemisphere.
      rationale:
        - Painting provinces as bordered regions coloured by their holder reads as a real political map, which marker dots never did, while baking on change keeps the per-frame cost at zero.
      references:
        - mvp-3d-world-and-system-with-2d-details
        - egui-for-information-panels
        - starting-armies-per-faction

  - decision: context-sensitive-job-ui
    core:
      status: accepted
      confidence: confirmed
      title: Jobs Start from Context Buttons on the Selection
      summary: >-
        The player starts a job from action buttons on the inspected
        entity rather than a separate form. A member of the player's house
        lists the jobs they can lead (target-less jobs on one click, others
        via an inline picker and Confirm); an outside character offers the
        schemes that target them plus Petition the Consul when they hold
        that title; a province offers the military jobs with an inline army
        or ship picker and itself pre-filled. Ineligible leaders are
        filtered and rejections surface inline. Every action still issues
        the same PlayerCommand::StartJob through the authoritative pipeline.
      rationale:
        - Anchoring the available jobs to what the player is looking at makes the action set legible and surfaces otherwise-buried jobs such as recruiting an army, without changing the authoritative command path.
      references:
        - character-led-jobs-are-primary-actions
        - headless-authoritative-simulation
        - egui-for-information-panels

  - decision: forecasts-derive-from-shared-resolution-code
    core:
      status: accepted
      confidence: confirmed
      title: Forecasts and Resolution Share One Calculation
      summary: >-
        Outcome weighting, job duration, and personal-risk chances live in
        a single simulation-owned module that both the forecast and the
        resolution call. Job resolution rolls against exactly the table the
        forecast reports, and a march is quoted by the function that sets
        its duration. Odds are apportioned to permille by largest
        remainder so they sum exactly, and a conditional military contest
        is reported separately rather than folded into the roll.
      rationale:
        - A forecast is strategic information only if it cannot drift from the simulation that later fulfils it; sharing the code makes drift impossible rather than merely unlikely.
        - Separating the operational contest avoids promising a precision the model does not possess at order time.
      references:
        - job-forecasts-share-authoritative-calculations
        - job-forecast-and-explanation-ui
        - skill-shifted-result-weights

  - decision: order-is-neutral-at-its-starting-value
    core:
      status: accepted
      confidence: confirmed
      title: Provincial Order Is Balanced Around Its Starting Value
      summary: >-
        Both consequences of order — what a province yields and how
        reliably it is defended — are exactly neutral at the settled
        starting value, so introducing the system rebalanced nothing. A
        quiet province holds its ground indefinitely; active harm always
        pushes order down; damage is repaired only where the holder
        attends to the province with troops or in person, and only back to
        settled. Order beyond that is earned by deliberate administrative
        work through authored effects.
      rationale:
        - Anchoring the modifiers at the starting value means order can be added to a balanced campaign without silently re-tuning its economy or its battles.
        - Making passive attention repair rather than improve keeps presence from becoming a free bonus for merely existing somewhere, and gives administrative jobs a purpose.
      references:
        - provincial-order-system
        - provincial-order-connects-existing-systems
        - wealth

  - decision: revolt-vacates-rather-than-transfers
    core:
      status: accepted
      confidence: confirmed
      title: A Revolt Vacates a Province Rather Than Gifting It
      summary: >-
        A province left in open unrest past its telegraphed clock throws
        off its ruler and its title falls vacant, rather than passing to a
        rival. It stops paying its former holder, counts toward nobody's
        claim, and can be taken by whoever can hold it. The warning is
        given the day the clock starts and the remaining days stay visible
        while it runs.
      rationale:
        - Losing ground to your own misrule is a real stake, but handing it to a rival would make neglect a gift rather than a failure.
        - A vacant title is recoverable through the existing siege rules, which keeps the state bounded and free of irreversible collapse.
      references:
        - provincial-order-system
        - military-operation-system
        - planetary-paramount-title-is-contested

  - decision: weighty-events-interrupt-minor-events-inform
    core:
      status: accepted
      confidence: confirmed
      title: Only Weighty Events Interrupt
      summary: >-
        Events are drawn by two independent daily gates. A weighty event
        raises a choice popup and pauses the campaign, and is rare enough
        to be worth the interruption; a minor event applies its effect and
        writes to the filterable log without stopping play. Eligibility is
        declarative data rather than script, evaluated over subjects in
        stable ID order, and every firing and answer is recorded.
      rationale:
        - The client pauses on every popup, so event volume is really a question of how often play is interrupted; splitting the deck keeps interruption proportionate to consequence.
        - Declarative eligibility can be validated at load and replays identically, which scripted predicates would not guarantee.
      references:
        - milestone-2-contextual-event-system
        - milestone-2-event-scope-is-systemic-not-map-expansion
        - notable-result-message-log

  - decision: obligations-seeded-in-the-opening-scenario
    core:
      status: accepted
      confidence: confirmed
      title: The Succession Opens With a Political Past
      summary: >-
        The Ashkarr scenario begins with nine authored obligations among
        the existing houses — favours owed, promises with deadlines, and
        grievances of long standing. The ledger is therefore live from the
        first day and already shapes what autonomous houses do, rather
        than being an empty system that only fills through play.
      rationale:
        - A succession crisis without prior debts and grudges has no political history for the crisis to be about.
        - Seeded entries exercise the ledger, its events, and intent-driven agency from turn one without adding any new map entities or houses.
      references:
        - political-obligation-ledger
        - obligations-are-specific-political-facts
        - mvp-hand-authored-scenario

  - decision: agency-intents-are-authored-on-jobs
    core:
      status: accepted
      confidence: confirmed
      title: Which Job Answers Which Pressure Is Authored Content
      summary: >-
        Autonomous houses score concrete pressures, then choose among jobs
        whose authored ai_intent declares that they answer that pressure.
        The simulation never names a piece of content, so a new job joins
        the AI's repertoire by declaring an intent. A house explains in the
        log why it acted on a pressure, while routine upkeep speaks through
        its results.
      rationale:
        - Hardcoding job keys in the engine would couple the simulation to a particular content set and break every fixture that authors its own jobs.
        - Explaining pressure-driven actions makes autonomous behaviour legible without exposing the roll that broke a tie as though it were certainty.
      references:
        - intent-driven-organisation-agency
        - ai-agency-through-the-job-catalogue
        - job-system

  - decision: egui-with-owned-design-tokens
    core:
      status: accepted
      confidence: confirmed
      title: egui Plus an Owned Design-Token Layer, Not an HTML Interface
      summary: >-
        The interface stays on egui, and its whole appearance moves into a
        serde token file the client embeds at build time. A designed token
        set replaces the authored one wholesale without touching rendering
        code. The alternative of defining the interface in HTML was
        investigated and rejected: wry is a native webview binding and
        cannot compile to wasm32, which is the target the game is actually
        played on; bevy_wry has been unmaintained since 2024 and
        bevy_webview_wry is pinned to an older Bevy. bevy_hui does support
        the current Bevy but ships no widgets at all, against an open engine
        limitation preventing a child node escaping its parent's clipping —
        which is exactly what tooltips and dropdowns need, and this
        interface is made of pervasive hover explanations, pickers, scroll
        areas and modal windows.

        The token set covers the whole appearance, not only colour: widget
        state surfaces, per-state stroke weights and hover expansion,
        button padding, shadows, scrollbars, menus, tooltips, sliders, the
        structural on/off choices, and the sizes of the parts the client
        draws by hand. Every token is read by something, and a test names
        each one and fails if changing it leaves the applied style
        identical. On native the file is also watched and re-applied on
        save, and a specimen panel renders every token in context, so the
        design loop is a save rather than a rebuild.
      rationale:
        - The web build is the primary playable surface, so an approach that cannot compile to wasm32 could never serve it whatever its merits natively.
        - Owning the token struct carries no migration risk and no dependency that can go stale, where the published egui theme crates are either abandoned or unverified against the egui version in use.
        - Tokens translate mechanically into egui's state-keyed style, so design work can be requested as a token file plus static mockups rather than as shipping code.
        - A token nothing reads is worse than no token, because it lies to whoever sets it; three had already gone bad unnoticed, including one that drew every plain label in the muted secondary colour, so the rule is enforced by a test rather than left as an intention.
        - Nothing is tokenised that egui cannot express — there is no disabled colour, because egui fades by alpha rather than carrying a disabled widget state, and no font family, because the build ships one face.
      references:
        - job-forecast-and-explanation-ui
        - context-sensitive-job-ui

  - decision: single-source-leader-availability
    core:
      status: accepted
      confidence: confirmed
      title: Exactly One Function Answers Whether a Character May Lead
      summary: >-
        leader_availability in the simulation is the only answer to whether
        a character can lead a job, and it returns the specific cause rather
        than a boolean. Being assigned a standing command is not a blocker
        in itself — a general may still lead a diplomatic job — so whether a
        commitment bars a particular job is asked per target. The client
        renders the returned cause and never re-derives eligibility.
      rationale:
        - Three partial implementations had drifted apart, which is what made busy characters appear selectable and then silently no-op on click.
        - A cause rather than a boolean is what lets the interface say why someone is unavailable and when they will be free, instead of omitting them and leaving the player to wonder where their household went.
      references:
        - context-sensitive-job-ui
        - job-system

  - decision: ship-captains-are-assigned-and-consequential
    core:
      status: accepted
      confidence: confirmed
      title: Ships Are Commanded by Assigned Captains
      summary: >-
        A ship's captain is assigned by player command, persists like an
        army's general, is required before the ship can be ordered, and
        scales what the ship achieves. Content validation checks that a
        captain belongs to the ship's owner. On a captain's death the post
        falls vacant and says so.
      rationale:
        - The field existed but was inert, so the interface papered over a missing captain by falling back to the house head, which meant ordering a ship nobody was commanding.
        - Giving the post mechanical weight makes assigning it a decision rather than a formality, and matches how armies already work.
      references:
        - job-system
        - job-based-operational-warfare

  - decision: hop-distance-answers-realm-questions
    core:
      status: accepted
      confidence: confirmed
      title: Realm Questions Are Answered by Hop Distance, Not Top of Chain
      summary: >-
        Whether a province answers to a house is asked as a hop count
        through the liege chain, in the simulation rather than the client.
        Walking to the top of the chain answers a different question and is
        wrong for any house that is itself a vassal.
      rationale:
        - The player's own house is a vassal, so a top-of-chain walk attributed its holdings to its liege and showed the player none of their own realm.
        - Living in the simulation makes it testable against the real scenario rather than only against whatever the client happens to render.
      references:
        - strategic-map-intelligence-modes
        - title-based-territorial-politics

  - decision: painter-drawn-ui-icons
    core:
      status: accepted
      confidence: confirmed
      title: Interface Icons Are Drawn From Primitives
      summary: >-
        Icons are drawn as painter shapes inside a unit square, scaled to
        whatever rect they are given. The client ships no image assets and
        the egui integration requires textures to be registered before use,
        so an icon set made of files would add a loading path, a
        registration step and a wasm packaging concern. Font glyphs were
        rejected because coverage varies by platform and a missing glyph is
        a silent box rather than a build error.
      rationale:
        - Primitive shapes are resolution-independent, tinted by the theme like every other element, and identical on both targets.
        - Shapes are chosen to differ in silhouette rather than in detail, because at toolbar size the outline is what is actually read.
      references:
        - strategic-map-intelligence-modes
        - egui-with-owned-design-tokens

  - decision: world-read-access-module
    core:
      status: accepted
      confidence: confirmed
      title: One Module Answers World-Read Questions
      summary: >-
        The simulation crate has a single access module that answers
        "give me this entity's record": records and entities by stable
        ID, display names, the Consul and the Sanctora, stable-ID-ordered
        ID collections, message-log date stamping, and campaign-seed
        stream derivation. Systems no longer open-code the index-entity-
        component walk, private display-name resolvers, or their own
        seed fetching.
      rationale:
        - Every open-coded copy of these walks was a place the stable-ID-iteration and derived-stream rules could be silently broken; concentrating them makes the determinism discipline reviewable in one file.
        - The migration was verified behaviour-identical by bit-equal acceptance hashes before and after, so the refactor carries no replay risk.
      references:
        - stable-id-ordered-iteration
        - hand-rolled-deterministic-rng
        - deterministic-campaign-simulation

  - decision: map-facts-are-simulation-answers
    core:
      status: accepted
      confidence: confirmed
      title: The Map's Political Facts Are Simulation Answers
      summary: >-
        Every political fact a map mode colours by is a simulation
        function, tested against the real scenario: province holders come
        from province_holder, great-house realms from great_house_of,
        garrison strength from garrison_in (counted in stable-ID order),
        and claim standing from the same province_counts_on and
        dominant_claimant the claim job itself uses — so a tied field
        shows nobody leading, exactly as the claim would resolve. The
        interface's leader gating goes back through leader_availability,
        which the client had drifted into re-deriving.
      rationale:
        - The client's claim-pressure heuristic showed a house "currently leading the claim" in the opening three-way tie that the simulation would refuse; asking the simulation makes the map agree with the rules it depicts.
        - The re-derived leader gate was the exact bug class the single-source-leader-availability decision was written against; it had grown back within two milestones, which is why the predicate now lives nowhere but the simulation.
      references:
        - single-source-leader-availability
        - hop-distance-answers-realm-questions
        - strategic-map-intelligence-modes
        - world-read-access-module

  - decision: builder-schema-is-the-reads
    core:
      status: accepted
      confidence: confirmed
      title: A Definition's Schema Is Stated Once, as Its Reads
      summary: >-
        The content host is three modules — the sandbox and orchestration,
        the define_* builders, and the cross-reference validation pass —
        instead of one 2,400-line file. Each builder reads its fields
        through a tracked reader: the reads themselves are the schema, the
        unknown-field warning is computed from what was actually read (so
        the old hand-maintained allow-lists are gone and cannot drift),
        and vocabulary fields are read against a spelling table whose
        error message lists every valid option. Individual validation
        branches are unit-tested through a minimal political fixture
        rather than only through whole-scenario loads.
      rationale:
        - Every definition's field names were typed twice within twenty lines (the allow-list and the reads) and nothing but review kept them equal; deriving the warning from the reads removes the second statement entirely.
        - Wrong-typed optional fields (an integer weighty, a map family) used to be silently coerced to their defaults; a schema stated as reads makes them loud, which is the same honesty the effect boundary already has.
      references:
        - content-defined-by-builder-calls
        - validated-declarative-game-data
        - boundary-vocabularies-parsed-once

  - decision: restore-mirrors-capture
    core:
      status: accepted
      confidence: confirmed
      title: A Full Restore Reads at One Seam, Mirroring Capture
      summary: >-
        capture_state has always listed every persisted section in one
        place; restore now does too. restore_state installs the
        content-free half (identity, clock, allocator, command pipeline,
        obligations, events) and restore_content_state respawns the
        content-bound half (map, politics, forces, jobs, script runtime,
        content database) in the same order start_campaign_with_content
        creates it. The host composes the pair instead of finishing the
        restore itself with knowledge the snapshot module did not state.
      rationale:
        - Which sections restore where used to be split across two files and asymmetric with capture; a new persisted section could be captured but silently never restored, caught only by the acceptance replay.
        - Naming the two halves makes the content-free/content-bound boundary — which already governed obligations and events — an explicit rule rather than an accident of where code accumulated.
      references:
        - versioned-snapshots-plus-command-log
        - content-hash-binds-saves-to-content
        - campaign-persistence

  - decision: decisions-are-pure-application-is-separate
    core:
      status: accepted
      confidence: confirmed
      title: Random Decisions Are Pure Functions; Application Is Separate
      summary: >-
        Wherever a derived stream settles an outcome, the decision is a
        pure function of explicit inputs and the stream, separate from the
        world mutation that applies it. Job outcomes are drawn by
        forecast::resolve_outcome — the same module that reports the odds,
        so the roll obeys the forecast by construction rather than by two
        hand-written samplers agreeing. Field engagements are decided by
        decide_engagement over gathered EngagementInputs, and autonomous
        houses pick from their shortlist through pick_intent. Each
        consumes a fixed number of rolls, and each is unit-tested —
        including a statistical test that the sampler's empirical
        frequencies match result_odds.
      rationale:
        - The forecast promised the roll would use exactly the table shown to the player, but the sampler was a second hand-rolled implementation buried in a &mut World monolith with no test able to hold the two together.
        - A decision that is pure in its inputs and stream can be tested across thousands of seeds without running campaign ticks, which is where formula bugs actually get caught.
      references:
        - forecasts-derive-from-shared-resolution-code
        - job-forecasts-share-authoritative-calculations
        - strategic-engagement-formula
        - agency-intents-are-authored-on-jobs

  - decision: boundary-vocabularies-parsed-once
    core:
      status: accepted
      confidence: confirmed
      title: Script Boundary Vocabularies Are Typed, and Parsed Exactly Once
      summary: >-
        The vocabularies authored content shares with the simulation — the
        seven effect roles (leader, target, target-head, owner-head,
        liege-head, consul, sanctora) and the obligation kinds (favour,
        promise, grievance) — are enums in the content crate, parsed once
        where the content enters (define_* conversion and effect parsing)
        and typed everywhere after. A mistyped role or kind is a loud
        parse error, never a silent no-op or a defensive fallback. One
        resolver (JobRoles::resolve) answers who stands behind each role
        for jobs, popup choices, and events alike, and every effect
        function receives one documented context schema (source, result,
        leader, target) regardless of what invoked it.
      rationale:
        - The role vocabulary had one producer, three consumers, and no type; events had already drifted to filling only half the roles, and a typo'd role addressed nobody without a word of complaint.
        - Parsing at the boundary is the only place the whole vocabulary is visible at once, which is what makes the error message able to spell out every valid spelling.
      references:
        - effects-returned-not-emitted
        - scripts-emit-validated-effects-only
        - job-effect-roles

  - decision: non-modal-character-picker
    core:
      status: accepted
      confidence: confirmed
      title: The Character Picker Is a Workspace, Not a Modal
      summary: >-
        Choosing who leads an action happens in one non-modal window that
        stays open when a candidate is selected. Candidates carry their
        whole forecast rather than a summary of it, so the breakdown shown
        while comparing is the object that will resolve the job. Those who
        cannot take the job on are listed below a divider with the
        simulation's own account of where they are; when nobody is free the
        empty state names the soonest date one comes free.
      rationale:
        - Choosing a leader is comparison work, and a window that closes on selection forces the comparison to be restarted for every candidate considered.
        - Carrying the forecast rather than a summary means the figure compared on cannot drift from the figure committed to, which is the same guarantee the forecast system already makes for the expanded action.
        - An empty list that explains itself and names a date turns waiting into a decision rather than a guess.
      references:
        - forecasts-derive-from-shared-resolution-code
        - single-source-leader-availability
        - context-sensitive-job-ui

  - decision: display-text-lives-in-one-string-table
    core:
      status: accepted
      confidence: confirmed
      title: Every Player-Facing String Lives in One Table
      summary: >-
        No display text is written in Rust or in authored Rhai. One CSV
        holds every string the player reads, each row carrying an ID, the
        context whoever translates it needs, and the English text. Content
        rows are keyed by derivation from the definition's own ID —
        province.karvessa.name, event.grain-riot.log-text — so a definition
        cannot point at the wrong row and a renamed definition either takes
        its prose with it or fails to load. Interface and simulation rows
        are keyed by hand under ui. and sim. prefixes. The table is
        embedded at build time and inserted by the simulation plugin, so a
        world restored from a snapshot has it for the same reason a fresh
        one does; it is not campaign state and is not snapshotted.
      rationale:
        - Translation needs one data source with stable IDs, and code is not one.
        - Deriving a definition's key from its ID removes the second place the two could disagree, which an authored key field would reintroduce.
        - Resolving simulation log lines as they are written keeps LogEntry a plain string, leaving the snapshot format, state hashing, and the client's log filter untouched. A save records the language it was played in, which is the price of that and is worth paying until a second language exists.
        - Pluralised strings are two whole rows selected on the count rather than a sentence assembled from fragments, so word order stays the translator's to choose.
        - Enums whose variants the player reads return keys rather than English, which turns "this variant has no label" from an invisible gap into a failing test.
      references:
        - content-ids-are-kebab-case-strings
        - client-embeds-content-at-build-time
        - validated-declarative-game-data

  - decision: unapproved-prose-is-bracketed-in-the-data
    core:
      status: accepted
      confidence: confirmed
      title: Unapproved Prose Is Bracketed in the Data
      summary: >-
        English that no human has yet approved is wrapped in square
        brackets in the table itself, not flagged by a column or decorated
        at runtime. Approving a line is the act of deleting its brackets.
        The loader reports how many rows remain bracketed, so the figure is
        visible on every validate run.
      rationale:
        - Almost all the prose was drafted mechanically, and the brackets make that legible on screen rather than hiding it in a manifest a reader has to go and consult.
        - Brackets in the data mean the placeholder state survives every path the text takes — panels, logs, popups, tooltips — without any code knowing about it.
        - Approval becomes a one-character edit in the file being read, which is the smallest possible ceremony for the act that matters most.
      references:
        - display-text-lives-in-one-string-table

  - decision: surface-positions-are-directions-not-points
    core:
      status: accepted
      confidence: confirmed
      title: A Body's Surface Is Addressed by Direction, Not by World Position
      summary: >-
        Every place on a body is held as a unit direction derived from its
        authored latitude and longitude, never as a rendered position. One
        projection type turns a direction into a world point, turns a world
        point back into a direction, and answers whether a place faces the
        camera. Mesh, labels, selection pin and click targets all ask it,
        so the globe and the flat map are the same map drawn two ways
        rather than two maps kept in step.
      rationale:
        - Placing and un-placing are inverses, and are tested as such, because a projection that drew a province somewhere it could not be clicked would be worse than offering no second projection at all.
        - The baked political texture is equirectangular in latitude and longitude, which is what a sphere's UVs and a plane's UVs both ask for, so one bake serves both meshes and no second texture pipeline exists.
        - A flat map needs only four vertices, since an equirectangular texture maps linearly across a plane, where the sphere needs a grid to curve between the same UVs.
        - "Back-face culling belongs to the projection rather than to the label renderer: a globe hides half its surface and a flat map hides nothing, and that is a fact about the projection."
      references:
        - strategic-map-intelligence-modes
        - painter-drawn-ui-icons

  - decision: rng-stream-labels-are-identities-not-names
    core:
      status: accepted
      confidence: confirmed
      title: A Random Stream's Purpose Label Is an Identity, Not a Name
      summary: >-
        Every derived random stream is keyed by the campaign seed, a short
        purpose label, and the acting entity's stable id. The label is
        hashed into the stream, so it identifies the stream rather than
        describing it: changing one re-rolls every outcome it has ever
        produced. Labels are therefore frozen once written, even when the
        concept they refer to is renamed around them, and the call sites
        and the RNG's own documentation say so.
      rationale:
        - Renaming the concept from Job to Assignment renamed the resolution stream's label with it, and 900 simulated days came out different — houses honoured debts they had previously repudiated. Nothing but a name had been touched.
        - A label that reads like prose invites exactly this, so the reason is recorded where the temptation is rather than in a document nobody opens mid-refactor.
        - "Nothing is lost by keeping an old spelling: the label is never shown to a player and its only job is to be stable."
      references:
        - deterministic-seed-and-command-replay
        - hand-rolled-deterministic-rng

  - decision: assignments-declare-who-they-may-target
    core:
      status: accepted
      confidence: confirmed
      title: An Assignment Declares Who It May Be Aimed At
      summary: >-
        Assignments carry an authored requirements block — whose the
        province is, whether a hostile force is present, whose house the
        target belongs to, what title they hold, whether they owe a favour,
        whether the owner is under threat at all — in the same shape events
        have used since M2.3. It is evaluated in exactly one place, so the
        button, the forecast, an autonomous house and a standing order
        cannot disagree about what is legal. Every field defaults to "do
        not care", so an assignment that declares nothing keeps the reach
        it had.
      rationale:
        - The previous check asked only whether the target existed, so a province was a legal raid target because it was a province — which is how raiding your own holdings and answering an alarm that was not sounding came to be on the menu.
        - The only relational rule that did exist was a content key spelled out in the client with its own title check, which is precisely what agency-intents-are-authored-on-jobs forbids; making the rule authored deletes it.
        - Defaulting to "do not care" is what allows the gate to be added without silently narrowing every piece of content nobody revisited.
      references:
        - agency-intents-are-authored-on-jobs
        - single-source-leader-availability
        - validated-declarative-game-data

  - decision: orders-live-under-the-thing-ordered
    core:
      status: accepted
      confidence: confirmed
      title: An Order Is Offered Under the Thing Being Ordered
      summary: >-
        Armies and ships are selectable and have inspectors, and their
        assignments are offered there. A province offers what can be done
        to ground. A destination is a slot in the order rather than a
        reason to file the order under geography.
      rationale:
        - Every force assignment was offered under the province, because forces were not selectable at all — so marching read as something done to a province rather than something told to an army.
        - The rules that the old province-scoped plumbing carried — an army is commanded by its general, a ship by its captain, neither substitutable — outlived it and keep a home of their own where they remain testable.
      references:
        - context-sensitive-job-ui
        - ship-captains-are-assigned-and-consequential

  - decision: assignments-have-authored-phases
    core:
      status: accepted
      confidence: confirmed
      title: Assignments Run Through Phases, and Some Cannot Be Called Off
      summary: >-
        An assignment authors an ordered list of phases, each with a length
        and whether it can be interrupted, and what being called off during
        it costs. An assignment that authors none gets a single
        interruptible phase covering its duration, which is exactly how
        assignments behaved before. Duration is checked against the sum of
        the phases at load rather than believed. A cancellation asked for
        during a committed phase is recorded and honoured when the phase
        ends.
      rationale:
        - An assignment that could be cancelled at any moment with no cost made committing to one not a decision.
        - Being turned back on the road is not the same as abandoning a siege, so what an interruption costs is authored per phase rather than once.
        - Recording a cancellation rather than refusing it matters because a click that appears to do nothing is indistinguishable from one that was not registered.
        - "The point of no return is on the definition so the interface can show it before the player commits: a deadline they cannot see is not a decision they get to make."
      references:
        - job-forecast-and-explanation-ui
        - validated-declarative-game-data

  - decision: standing-orders-are-priority-lists
    core:
      status: accepted
      confidence: confirmed
      title: A Standing Order Is an Ordered List of Assignments
      summary: >-
        A force holds an ordered list of assignments it may start on its
        own; each day it starts the first whose authored requirements are
        satisfied, through the same validation a player's order takes. The
        interface offers the list by asking the content what that kind of
        force can do, so neither the engine nor the client names an
        assignment.
      rationale:
        - The previous form was two variants with the defending behaviour hardcoded down to the content key of the assignment it started — the last content key compiled into the simulation.
        - "Sharing the authored requirements is the guarantee worth having: a force can never do unbidden what its owner could not have ordered by hand."
        - New behaviour becomes authored rather than compiled, and the order a force reaches for things in becomes a decision the player can make.
      references:
        - assignments-declare-who-they-may-target
        - agency-intents-are-authored-on-jobs
        - job-based-operational-warfare

  - decision: households-act-within-their-own-means
    core:
      status: accepted
      confidence: confirmed
      title: An Idle Household Member Acts, but Never Spends
      summary: >-
        A member of a house with no assignment picks one up unbidden,
        provided it costs the house nothing in wealth, manpower, supplies
        or influence. Anything that spends waits for the person whose
        stores they are. Every such start goes through the same validation
        a player's order takes, and candidates are walked in stable id
        order. Assignments carry a coarse three-level urgency, read only by
        what may be picked up and what may interrupt what.
      rationale:
        - A household that stood still until told was the larger fault, but a household that quietly drains the treasury while the player is looking elsewhere is worse; costing nothing is the narrowest leash that fixes the first without causing the second.
        - Urgency is deliberately coarse because a finer scale would invite tuning that no player could perceive.
        - This is the household acting within a house, a different level from whole houses acting through intent-driven agency, which it leaves untouched.
      references:
        - intent-driven-organisation-agency
        - single-source-leader-availability

  - decision: plans-are-data-not-script
    core:
      status: accepted
      confidence: confirmed
      title: A Plan Is Data All the Way Down
      summary: >-
        define_plan declares a goal from the shared intent vocabulary,
        methods gated by declarative integer conditions, and ordered steps
        naming assignments or sub-plans. Loading validates every key,
        target compatibility, and acyclic sub-plan composition no deeper
        than three; nothing about a plan is script. Conditions evaluate
        over visible state and replay identically.
      rationale:
        - Conditions as data validate at load and can be shown to the player as reasons; a scripted condition can do neither and is a determinism risk besides.
        - A step field is spelled 'start' rather than 'do' because 'do' is a reserved word in Rhai; recorded so nobody "fixes" it back.
      references:
        - agency-intents-are-authored-on-jobs
        - plans-are-authored-campaigns
        - content-ids-are-kebab-case-strings

  - decision: plan-steps-bypass-ai-available-not-validation
    core:
      status: accepted
      confidence: confirmed
      title: Plan Steps Bypass ai_available, Never validate_start
      summary: >-
        A plan step may name an assignment the reactive scorer cannot
        reach, because ai_available gates the scorer's monthly repertoire
        and nothing else. What a step can never bypass is validate_start,
        which every start still passes.
      rationale:
        - A campaign may deliberately call for assignments the scorer must not reach for on a whim, muster being the standing example; the guarantee worth keeping is the gate, not the flag.
      references:
        - plans-are-authored-campaigns
        - standing-orders-are-priority-lists
    evidence:
      - kind: test
        reference: crates/aeon_sim/tests/plans.rs
        summary: >-
          The peace plan's first step is an ai_available:false assignment
          and starts anyway; every step still passes validate_start, the
          same guarantee standing orders live under.

  - decision: plans-live-in-one-resource
    core:
      status: accepted
      confidence: confirmed
      title: Plan State Is One Resource, Snapshot Section Like Any Other
      summary: >-
        Active plans and cooldowns live in a single resource of BTreeMaps
        keyed by character, serialised into the campaign snapshot
        (format v11) beside obligations and events. Steps are flattened at
        adoption — sub-plans expand then, by first eligible method — so a
        running plan never consults another definition. Abandonment plus
        cooldown is the entire failure policy; there is no replanning
        search, and max_days is the single safety valve for a blocked step.
      rationale:
        - Plans are consulted by stable character id from several systems; BTreeMaps give the iteration order determinism requires for free.
        - One legible safety valve beats a second per-step policy nobody can reason about; a house that still wants the goal adopts afresh after the cooldown, visibly.
      references:
        - plans-are-authored-campaigns
        - characters-are-the-acting-unit
        - rng-stream-labels-are-identities-not-names

  - decision: goals-are-a-lens-over-scoring
    core:
      status: accepted
      confidence: confirmed
      title: A Goal Steers by Biasing Scoring, Not by Executing
      summary: >-
        A grand-strategy goal adds no executor. While a house holds one, it
        lifts the pressures the goal favours in the head's own scoring, so
        the reactive scorer, the plans, and the assignments already in
        place carry the ambition out. The goal lives in a resource keyed by
        the organisation rather than the character, so it outlives the
        succession that ends a plan; it ends when its rival falls, its
        house falls, or its horizon passes.
      rationale:
        - A second execution engine above plans would double the ways a house can act and the places behaviour can diverge; a bias over the one scorer keeps a single path from pressure to deed.
        - An ambition that spans reigns belongs to the house, not the person, which is why goals key by organisation while plans key by character.
      references:
        - grand-strategy-goals
        - plans-are-authored-campaigns
        - characters-are-the-acting-unit
        - rng-stream-labels-are-identities-not-names

  - decision: directives-are-derived-not-stored
    core:
      status: accepted
      confidence: confirmed
      title: A Goal's Directives Are Derived, Not Stored
      summary: >-
        A directive pressed by a liege's ambition is read straight off goal
        state through one function, directives_on, rather than kept in a
        record of its own. It therefore exists exactly while the liege
        holds the goal that presses it, cannot drift after a restore, and
        lapses for free when the goal ends. Only a directive issued by hand
        — which has no goal behind it — is stored, in IssuedDirectives, and
        the same function merges the two so the scorer and the interface
        read one source. A directive is advisory: it lifts a pressure in
        the vassal head's scoring and never compels.
      rationale:
        - Storing what can be derived invites the store and the source to disagree; deriving the goal's directives removes a snapshot section and a whole class of drift.
        - A hand-issued directive is the exception that must be stored precisely because no goal stands behind it to derive it from.
      references:
        - grand-strategy-goals
        - goals-are-a-lens-over-scoring
        - organisation-agency-model

  - decision: directives-authorised-by-the-chain-of-command
    core:
      status: accepted
      confidence: confirmed
      title: A Directive Is Authorised by the Chain of Command
      summary: >-
        IssueDirective and ClearDirective are the first player commands
        authorised by hierarchy rather than ownership: the player may press
        a directive on a house that answers directly to them —
        answers_to == Some(1) — and on no other, re-checked at apply time
        like every command. What the player may ask of a vassal is exactly
        what the vassal could choose, so the advisory rule holds in both
        directions, and the interface shows the player both the wish their
        liege presses on them and the wish they press on a vassal.
      rationale:
        - Every prior command validated against the player's own organisation; directing a vassal is a genuinely new authority, and the hierarchy — not ownership — is what grants it.
        - "Advisory in both directions keeps the guarantee that a house acts only through its head — neither a liege nor the player can compel a vassal to do what it could not have chosen."
      references:
        - grand-strategy-goals
        - directives-are-derived-not-stored
        - player-organisation
        - single-source-leader-availability

  - decision: goods-balance-is-derived-not-stored
    core:
      status: accepted
      confidence: confirmed
      title: A World's Goods Balance Is Derived, Not Stored
      summary: >-
        A body's net balance in each good — production less consumption
        across its provinces, plus what its buildings add and its routes
        carry in — is recomputed whenever it is read, never kept in a
        buffer. Production and consumption are content; buildings and trade
        routes are already-persisted state; so the balance follows from
        state that exists and needs no store of its own. A world in want
        reuses the order system's existing privation rather than adding a
        new arithmetic kind; a surplus sells and splits among the world's
        held provinces.
      rationale:
        - A stored balance invites the store and its sources to disagree; deriving it keeps one truth and removes a snapshot section and a reconciliation step.
        - Reusing the order privation for a goods shortfall means a hungry world behaves like a supply-starved one, which the player already understands.
      references:
        - the-goods-economy
        - provincial-order-system
        - plans-live-in-one-resource

  - decision: trade-crosses-worlds-only-by-ship
    core:
      status: accepted
      confidence: confirmed
      title: Goods Net Within a World, but Cross the Gulf Only by Ship
      summary: >-
        Goods flow freely within a body but do not net between bodies:
        a hungry world is answered only by a transport plying a standing
        route to it, the ship's counterpart to an army's standing orders.
        A running route brings its capacity of the good each month and
        earns its carrier the margin on what it sells into scarcity; a
        blockade at either dock cuts the line. The route is ship state, so
        it persists with the ship, and its relief is derived like the rest
        of the balance. The transport shuttles its docks through the
        transit machinery ships already have.
      rationale:
        - Making distance matter — a surplus on one world cannot answer a want on another without a carrier — is what turns tracked starships and idle transports into an economy rather than flavour.
        - Interdicting trade by blockade layers a lever of war onto a system that already halves a blockaded province's wealth.
      references:
        - the-goods-economy
        - tracked-starships
        - job-based-operational-warfare
