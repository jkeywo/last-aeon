      title: The Playable Web Build Deploys to GitHub Pages
      summary: >-
        CI builds the release WebAssembly client with trunk, prefixing
        asset URLs with the repository subpath (--public-url /last-aeon/),
        uploads it as a Pages artifact, and deploys it to GitHub Pages from
        main after the spec, test, and wasm jobs pass. The same authored
        content is embedded at build time, so the published build cannot
        drift from what CI validated. Enabling Pages with the GitHub
        Actions source is a one-time repository setting.
